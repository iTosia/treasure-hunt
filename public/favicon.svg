<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="16" cy="16" r="14" fill="url(#gold)" />
    <circle cx="16" cy="16" r="12" fill="none" stroke="#B8860B" stroke-width="1.5" />
    <path d="M11 11 L21 21 M21 11 L11 21" stroke="#8B4513" stroke-width="4" stroke-linecap="round" />
    <path d="M11 11 L21 21 M21 11 L11 21" stroke="#FF4500" stroke-width="2" stroke-linecap="round" />
    <ellipse cx="12" cy="10" rx="6" ry="3" fill="url(#shine)" transform="rotate(-30 12 10)" />
  </g>
</svg>
